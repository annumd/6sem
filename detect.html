0%{transform:rotate(0deg);}

<body>

<script>
if(!localStorage.getItem("loggedInUser")){
window.location.href = "login.html";
}

<header>
<h1>AI Voice Spoof Detection System</h1>

<nav>

<main>

<section style="text-align:center; padding:60px 20px;">

<h2>Voice Spoof Detection</h2>

<p style="margin-bottom:35px;">
Upload a voice recording below to analyze whether the audio
is genuine or spoofed using our AI model.
</p>

<div class="upload-box">

<label for="audio-file" style="display:inline-block;padding:12px 22px;background:#38bdf8;color:white;border-radius:6px;cursor:pointer;margin-bottom:20px;">
Add Audio File
</label>

<!-- changed to allow all audio -->
<input type="file" id="audio-file" accept="audio/*" style="display:none">

<br>

<!-- NEW BUTTON -->
<button onclick="convertToWav()">Convert to WAV</button>

<br><br>

<button onclick="analyzeVoice()">Analyze Voice</button>

<div class="result-box" id="result-box" style="margin-top:25px;">
</div>

</div>

</section>

</main>

<script>

const fileInput=document.getElementById('audio-file');
const resultBox=document.getElementById('result-box');

/* SHOW MESSAGE AFTER AUDIO IS ADDED */
fileInput.addEventListener("change", function(){
if(fileInput.files.length>0){
resultBox.innerHTML='<p>Audio has been added.</p>';
}
});

/* NEW: Convert to WAV */
async function convertToWav(){

if(fileInput.files.length===0){
alert("Upload an audio file first");
return;
}

const file=fileInput.files[0];

const audioContext=new AudioContext();
const arrayBuffer=await file.arrayBuffer();
const audioBuffer=await audioContext.decodeAudioData(arrayBuffer);

const wavBlob=bufferToWav(audioBuffer);
const wavFile=new File([wavBlob],"converted.wav",{type:"audio/wav"});

const dataTransfer=new DataTransfer();
dataTransfer.items.add(wavFile);
fileInput.files=dataTransfer.files;

resultBox.innerHTML='<p>Converted to WAV successfully!</p>';
}

/* helper function */
function bufferToWav(buffer){
const numOfChan=buffer.numberOfChannels;
const sampleRate=buffer.sampleRate;
const length=buffer.length*numOfChan*2+44;
const bufferArray=new ArrayBuffer(length);
const view=new DataView(bufferArray);

let offset=0;

function writeString(s){
for(let i=0;i<s.length;i++){
view.setUint8(offset++,s.charCodeAt(i));
}
}

function writeUint32(d){view.setUint32(offset,d,true);offset+=4;}
function writeUint16(d){view.setUint16(offset,d,true);offset+=2;}

writeString("RIFF");
writeUint32(length-8);
writeString("WAVE");

writeString("fmt ");
writeUint32(16);
writeUint16(1);
writeUint16(numOfChan);
writeUint32(sampleRate);
writeUint32(sampleRate*numOfChan*2);
writeUint16(numOfChan*2);
writeUint16(16);

writeString("data");
writeUint32(length-offset-4);

const channels=[];
for(let i=0;i<numOfChan;i++){
channels.push(buffer.getChannelData(i));
}

for(let i=0;i<buffer.length;i++){
for(let j=0;j<numOfChan;j++){
let sample=Math.max(-1,Math.min(1,channels[j][i]));
sample=sample<0?sample*0x8000:sample*0x7FFF;
view.setInt16(offset,sample,true);
offset+=2;
}
}

return new Blob([view],{type:"audio/wav"});
}

function analyzeVoice(){

if(fileInput.files.length===0){
alert("Please upload an audio file first.");
return;
}

/* show loading spinner */
resultBox.innerHTML=`
<div class="spinner"></div>
<p><strong>Analyzing audio...</strong></p>
`;

const formData=new FormData();
formData.append("audio",fileInput.files[0]);

fetch("https://spoofy-backend-kfvk.onrender.com/detect",{
method:"POST",
body:formData
})

.then(async response=>{
const data=await response.json();

if(!response.ok){
throw new Error(data.error || "Server error");
}

return data;
})

.then(data=>{
if(data.result){
resultBox.innerHTML=`<p><strong>Result:</strong> ${data.result}</p>`;
}else{
resultBox.innerHTML=`<p><strong>Result:</strong> Unexpected response</p>`;
}
})

.catch(error=>{
console.error(error);
resultBox.innerHTML=`<p><strong>Error:</strong> ${error.message}</p>`;
});

}

function logoutUser(){
localStorage.removeItem("loggedInUser");
window.location.href = "login.html";
}

</script>
