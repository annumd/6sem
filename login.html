<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - AI Voice Spoof Detection</title>
<link rel="stylesheet" href="style.css">

<style>
.login-body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#020617);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:#0b1220;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
}

.password-wrapper{
    position:relative;
}

.password-wrapper input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}

/* RED BORDER */
.error{
    border:2px solid red !important;
}

/* GREEN BORDER */
.success{
    border:2px solid #22c55e !important;
}

.eye-icon{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#38bdf8;
}

button{
    width:100%;
    padding:12px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.hidden{
    display:none;
}
</style>
</head>

<body class="login-body">

<section>
<div class="login-box">

<h2 style="color:#38bdf8;">AI Voice Spoof Detection</h2>
<p id="formTitle">Login to continue</p>

<!-- LOGIN -->
<form id="loginForm" onsubmit="return loginUser()">

<input type="text" id="loginUsername"
placeholder="Username" required>

<div class="password-wrapper">
<input type="password" id="loginPassword"
placeholder="Password" required>
<span class="eye-icon"
onclick="togglePassword('loginPassword',this)">👁</span>
</div>

<button>Sign In</button>
</form>

<!-- SIGNUP -->
<form id="signupForm" class="hidden"
onsubmit="return signupUser()">

<input type="text" id="signupUsername"
placeholder="Create Username" required>

<div class="password-wrapper">
<input type="password" id="signupPassword"
placeholder="Create Password" required>
<span class="eye-icon"
onclick="togglePassword('signupPassword',this)">👁</span>
</div>

<div class="password-wrapper">
<input type="password" id="confirmPassword"
placeholder="Confirm Password" required>
<span class="eye-icon"
onclick="togglePassword('confirmPassword',this)">👁</span>
</div>

<button>Sign Up</button>
</form>

<p>
<span id="switchMessage">
Don't have an account?
</span>
<a onclick="toggleForm()" id="switchLink"
style="color:#38bdf8;cursor:pointer;">
Sign Up
</a>
</p>

</div>
</section>

<script>

/* DEFAULT ACCOUNT */
if(!localStorage.getItem("username")){
localStorage.setItem("username","admin");
localStorage.setItem("password","1234");
}

let isLogin=true;

function toggleForm(){
document.getElementById("loginForm").classList.toggle("hidden");
document.getElementById("signupForm").classList.toggle("hidden");

document.getElementById("formTitle").textContent =
isLogin?"Create a New Account":"Login to continue";

document.getElementById("switchMessage").textContent =
isLogin?"Already have an account?"
:"Don't have an account?";

document.getElementById("switchLink").textContent =
isLogin?"Sign In":"Sign Up";

isLogin=!isLogin;
}

/* SHOW/HIDE PASSWORD */
function togglePassword(id,icon){
const input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
icon.textContent="🙈";
}else{
input.type="password";
icon.textContent="👁";
}
}

/* PASSWORD MATCH VALIDATION */
const pass=document.getElementById("signupPassword");
const confirmPass=document.getElementById("confirmPassword");

confirmPass.addEventListener("input",()=>{

confirmPass.classList.remove("error","success");

if(confirmPass.value==="") return;

if(confirmPass.value===pass.value){
confirmPass.classList.add("success");
}else{
confirmPass.classList.add("error");
}

});

/* SIGNUP */
function signupUser(){

if(pass.value!==confirmPass.value){
confirmPass.classList.add("error");
alert("Passwords do not match!");
return false;
}

localStorage.setItem(
"username",
document.getElementById("signupUsername").value
);

localStorage.setItem("password",pass.value);

alert("Account created successfully!");
toggleForm();
return false;
}

/* LOGIN */
function loginUser(){

const user=
document.getElementById("loginUsername").value;

const password=
document.getElementById("loginPassword").value;

if(
user===localStorage.getItem("username") &&
password===localStorage.getItem("password")
){
localStorage.setItem("loggedInUser",user);
window.location.href="index.html";
}
else{
alert("Invalid username or password");
}

return false;
}

</script>

</body>
</html>
